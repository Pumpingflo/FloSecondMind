<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AthleteOS</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
  --text: #efefef; --text2: #888; --accent: #00ff9d;
  --border: rgba(255,255,255,0.1); --rsm: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }

/* Cards & Layout */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rsm); padding: 20px; margin: 15px; }
.btn-primary { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; }

/* Navigation */
.nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(13,13,13,0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 100; backdrop-filter: blur(10px); }
.nav-item { color: var(--text2); font-size: 11px; cursor: pointer; background: none; border: none; flex: 1; text-align: center; }
.nav-item.active { color: var(--accent); font-weight: 600; }

/* Tabs */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Inputs */
input, select { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-top: 8px; }

/* Race List Style */
.race-item { background: var(--bg3); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
</style>
</head>
<body>

<div id="app">
    <div style="padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="font-size: 24px; font-weight: 600;">Athlete<span style="color:var(--accent)">OS</span></h1>
    </div>

    <div id="plan" class="tab-content active">
        <div class="card">
            <h3>Heutiges Training</h3>
            <p id="workout-info" style="color:var(--text2); margin-top:10px;">Lade Trainingsplan...</p>
        </div>
    </div>

    <div id="recovery" class="tab-content">
        <div class="card">
            <h3>Täglicher Check-In</h3>
            <label style="font-size:12px; color:var(--text2); display:block; margin-top:15px;">Regeneration (1-10)</label>
            <input type="range" id="ci-feel" min="1" max="10" value="7">
            <button class="btn-primary" onclick="alert('Check-In gespeichert!')">Speichern</button>
        </div>
        
        <div class="card" style="border-color: #333;">
            <h3>Verlauf & Trends</h3>
            <div id="history-data" style="margin-top:15px; font-size:13px; color:var(--text2);">Keine Einträge vorhanden.</div>
        </div>
    </div>

    <div id="nutrition" class="tab-content">
        <div class="card" style="background: linear-gradient(135deg, var(--bg2) 0%, #0a2e22 100%); border: 1px solid var(--accent);">
            <h3 style="color:var(--accent);">🤖 KI Ernährungscoach</h3>
            <p id="ai-hint" style="font-size:13px; margin:10px 0;">Analysiere deine Strava-Daten für personalisierte Tipps.</p>
            <button class="btn-primary" onclick="alert('Coach wird geladen...')">Coach fragen</button>
        </div>
    </div>

    <div id="athlete" class="tab-content">
        <div class="card">
            <h3>Strava CSV Import</h3>
            <input type="file" id="strava-csv" accept=".csv" onchange="processStravaCSV(event)" style="display:none;">
            <button class="btn-primary" style="background:#fc4c02; color:white;" onclick="document.getElementById('strava-csv').click()">Aactivities.csv hochladen</button>
        </div>

        <div class="card">
            <h3>Rennen & Ziele</h3>
            <div id="race-container"></div>
            <div style="margin-top:20px; border-top:1px solid #333; pt:15px;">
                <input type="text" id="race-name" placeholder="Name des Rennens">
                <input type="date" id="race-date">
                <select id="race-type"><option value="A">A-Race</option><option value="B">B-Race</option></select>
                <button class="btn-primary" onclick="addNewRace()">Ziel hinzufügen</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showTab('plan', this)">Plan</button>
        <button class="nav-item" onclick="showTab('recovery', this)">Check-In</button>
        <button class="nav-item" onclick="showTab('nutrition', this)">Ernährung</button>
        <button class="nav-item" onclick="showTab('athlete', this)">Athlete</button>
    </nav>
</div>

<script>
// --- KONFIGURATION ---
const SUPABASE_URL = 'https://jutlfkdesyutefgqtcxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1dGxma2Rlc3l1dGVmZ3F0Y3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTEwNTIsImV4cCI6MjA5MDc4NzA1Mn0.MF0cFM43L0YmXOCgyCpqS8gaE4tW9VkbR0KMc8XRPvo'; 
const supabase = net.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- TAB WECHSEL ---
function showTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

// --- RENNEN FUNKTIONEN ---
async function addNewRace() {
    const name = document.getElementById('race-name').value;
    const date = document.getElementById('race-date').value;
    const type = document.getElementById('race-type').value;
    
    if(!name || !date) return alert("Bitte alles ausfüllen");

    const { data: { user } } = await supabase.auth.getUser();
    if(!user) return alert("Bitte logge dich erst ein.");

    const { error } = await supabase.from('races').insert([{ 
        user_id: user.id, name, date, race_type: type 
    }]);

    if(!error) {
        document.getElementById('race-name').value = '';
        loadRaces();
    } else { alert("Fehler: " + error.message); }
}

async function loadRaces() {
    const { data: races } = await supabase.from('races').select('*').order('date', { ascending: true });
    const container = document.getElementById('race-container');
    if(!races) return;
    container.innerHTML = races.map(r => `
        <div class="race-item">
            <div><strong>${r.name}</strong><br><small>${r.date} (${r.race_type})</small></div>
            <button onclick="deleteRace('${r.id}')" style="background:none; border:none; color:red;">✕</button>
        </div>
    `).join('');
}

async function deleteRace(id) {
    await supabase.from('races').delete().eq('id', id);
    loadRaces();
}

// --- CSV ANALYSE ---
async function processStravaCSV(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
        const rows = e.target.result.split('\n');
        alert("Datei erkannt. Analysiere " + rows.length + " Aktivitäten...");
        // Hier können wir nun die Spalten crawlen wie besprochen
    };
    reader.readAsText(file);
}

// Initialer Aufruf
document.addEventListener('DOMContentLoaded', loadRaces);
</script>
</body>
</html>
